name: Mac Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desktop

    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        run: npm ci

      - name: Verify tag matches desktop version
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        run: |
          package_version=$(node -p "require('./package.json').version")
          tag_version="${GITHUB_REF_NAME#desktop-v}"
          if [ "$package_version" != "$tag_version" ]; then
            echo "Tag version $tag_version does not match desktop/package.json version $package_version"
            exit 1
          fi

      - name: Ensure Apple signing secrets are configured
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        run: |
          test -n "$CSC_LINK"
          test -n "$CSC_KEY_PASSWORD"
          test -n "$APPLE_ID"
          test -n "$APPLE_APP_SPECIFIC_PASSWORD"
          test -n "$APPLE_TEAM_ID"

      - name: Build installer
        if: github.event_name == 'workflow_dispatch'
        run: npm run dist:mac

      - name: Build and publish release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish:mac

      - name: Upload installer artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitaview-macos-installer
          path: desktop/release/*
