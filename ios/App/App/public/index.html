<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>VitaView</title>
    <meta http-equiv="refresh" content="0; url=https://vitaview.ai/auth" />
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f4f4;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #0f1115;
        }
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: inherit;
        color: #111827;
      }

      @media (prefers-color-scheme: dark) {
        body {
          color: #f3f4f6;
        }
      }

      main {
        width: min(28rem, calc(100vw - 2rem));
        padding: 1.5rem;
        border-radius: 1.25rem;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 18px 48px rgba(15, 23, 42, 0.12);
        text-align: center;
      }

      @media (prefers-color-scheme: dark) {
        main {
          background: rgba(17, 24, 39, 0.88);
          box-shadow: 0 18px 48px rgba(0, 0, 0, 0.36);
        }
      }

      a {
        color: inherit;
      }
    </style>
    <script>
      window.location.replace("https://vitaview.ai/auth");
    </script>
  </head>
  <body>
    <main>
      <h1>Abrindo VitaView...</h1>
      <p>Se nada acontecer, <a href="https://vitaview.ai/auth">toque aqui para continuar</a>.</p>
    </main>
  </body>
</html>
